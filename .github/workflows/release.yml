name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions: read-all

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        # actions/setup-node v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full quality gate
        run: |
          npm run lint:full
          npm run typecheck
          npm run test:run
          npm audit --audit-level=moderate

      - name: Build plugin
        run: npm run build

      - name: Verify release metadata
        run: npm run release:check

      - name: Package plugin zip
        run: |
          rm -rf ytkn ytkn.zip
          mkdir ytkn
          cp main.js manifest.json styles.css ytkn/
          zip -r ytkn.zip ytkn

      - name: Generate release checksums
        run: |
          sha256sum main.js manifest.json styles.css ytkn.zip > ytkn-release.sha256

      - name: Generate release provenance attestation
        id: attest
        # actions/attest v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: ytkn-release.sha256

      - name: Export release attestation bundle
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" ytkn-release.sigstore.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            main.js \
            manifest.json \
            styles.css \
            ytkn-release.sha256 \
            ytkn-release.sigstore.json \
            ytkn.zip \
            --title "$TAG_NAME" \
            --generate-notes \
            --verify-tag
