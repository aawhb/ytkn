name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a problem. Please remove any private API keys or vault content before posting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "1.5.8"
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "1.6.6 or newer"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop
        - Mobile
        - Both
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console errors or screenshots
      description: Optional, but useful for failures.
